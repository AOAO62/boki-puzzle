<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簿記パズル Master - 操作改善版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; background: #f8fafc; color: #1e293b; margin: 0; }
        .slashed { position: relative; opacity: 0.7; }
        .slashed::after {
            content: ''; position: absolute; top: 50%; left: -5%; width: 110%; height: 2px;
            background: rgba(239, 68, 68, 0.6); transform: rotate(-15deg); pointer-events: none;
        }
        .drop-zone { transition: all 0.2s ease; border: 2px dashed #cbd5e1; background: rgba(255, 255, 255, 0.5); }
        .drop-zone.active-hover { border-color: #3b82f6; background: #eff6ff; transform: scale(1.02); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.3s ease-in-out; border-color: #ef4444 !important; }
        
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .hint-popup { animation: fadeInScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .t-line { background: #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const STAGES = [
            {
                id: 1, title: "資産の増加", category: "基本",
                text: "現金 1,000円 を売り上げた。",
                debit: "現金", credit: "売上", amount: "1,000", date: "4月15日",
                target: "現金", targetSide: "left",
                hint: "現金は『資産』です。増えたときは仕訳の左側（借方）に記入します。",
                errorHint: "おっと！現金は【資産】です。資産が増えたときは、左側（借方）に記入するのがルールですよ！"
            },
            {
                id: 2, title: "費用の発生", category: "日常",
                text: "商品 500円 を仕入れ、代金は掛けとした。",
                debit: "仕入", credit: "買掛金", amount: "500", date: "4月20日",
                target: "仕入", targetSide: "left",
                hint: "仕入は『費用』です。発生したときは仕訳の左側（借方）に記入します。",
                errorHint: "残念！仕入は【費用】の発生です。費用の発生は、左側（借方）に記入します！"
            },
            {
                id: 3, title: "負債の増加", category: "日常",
                text: "銀行から 2,000円 を借り入れ、現金で受け取った。",
                debit: "現金", credit: "借入金", amount: "2,000", date: "5月1日",
                target: "借入金", targetSide: "right",
                hint: "借入金は『負債』です。増えたときは仕訳の右側（貸方）に記入します。",
                errorHint: "惜しい！借入金は【負債】です。負債が増えたときは、右側（貸方）に記入するのが正解です。"
            },
            {
                id: 4, title: "費用の減少（決算）", category: "決算整理",
                text: "支払保険料 180,000円 のうち、次期分 105,000円 を繰り越す。",
                debit: "前払保険料", credit: "保険料", amount: "105,000", date: "3月31日",
                target: "保険料", targetSide: "right",
                hint: "費用の取り消し（繰り越し）は、発生時とは逆の右側（貸方）に記入します。",
                errorHint: "難しいですね！保険料（費用）を減らすときは、発生時とは逆の右側（貸方）へ記入します。"
            },
            {
                id: 5, title: "資産の減少", category: "日常",
                text: "売掛金 800円 を現金で回収した。",
                debit: "現金", credit: "売掛金", amount: "800", date: "5月10日",
                target: "売掛金", targetSide: "right",
                hint: "売掛金（資産）が減ったので、仕訳の右側（貸方）に記入して消し込みます。",
                errorHint: "売掛金は【資産】です。今回は資産が減っているので、右側（貸方）に記入しましょう！"
            }
        ];

        const App = () => {
            const [view, setView] = useState('menu');
            const [stageIdx, setStageIdx] = useState(0);
            const [step, setStep] = useState(1); // 1:仕訳, 2:転記（3点セット）
            const [usedIds, setUsedIds] = useState([]);
            const [errorId, setErrorId] = useState(null);
            const [showErrorPopup, setShowErrorPopup] = useState(false);
            const [hoverId, setHoverId] = useState(null);

            const [journal, setJournal] = useState({ debit: null, credit: null });
            const [tData, setTData] = useState({ side: null, date: null, counter: null, amount: null });

            const current = STAGES[stageIdx];

            const blocks = useMemo(() => {
                return [
                    { id: 'date', type: 'date', value: current.date, color: 'bg-indigo-500' },
                    { id: 'debit', type: 'account', value: current.debit, color: 'bg-emerald-500' },
                    { id: 'credit', type: 'account', value: current.credit, color: 'bg-rose-500' },
                    { id: 'amount', type: 'amount', value: current.amount, color: 'bg-amber-500' },
                    { id: 'dummy1', type: 'account', value: '未払金', color: 'bg-slate-400' },
                ];
            }, [stageIdx]);

            const triggerError = (id) => {
                setErrorId(id);
                if (id.startsWith('t-')) {
                    setShowErrorPopup(true);
                    setTimeout(() => setShowErrorPopup(false), 3500);
                }
                setTimeout(() => setErrorId(null), 400);
            };

            const onDropJournal = (e, side) => {
                e.preventDefault(); setHoverId(null);
                const id = e.dataTransfer.getData('blockId');
                const block = blocks.find(b => b.id === id);
                if (!block) return;

                if (side === 'debit' && block.value === current.debit) {
                    setJournal(prev => ({...prev, debit: block}));
                    setUsedIds(prev => [...new Set([...prev, id])]);
                } else if (side === 'credit' && block.value === current.credit) {
                    setJournal(prev => ({...prev, credit: block}));
                    setUsedIds(prev => [...new Set([...prev, id])]);
                } else {
                    triggerError(side);
                }
            };

            const onDropTDetail = (e, key, side) => {
                e.preventDefault(); setHoverId(null);
                const id = e.dataTransfer.getData('blockId');
                const block = blocks.find(b => b.id === id);
                if (!block) return;

                // まず「正しい側」へのドロップかチェック
                if (side !== current.targetSide) {
                    triggerError('t-' + key);
                    return;
                }

                // 次に「正しい内容」かチェック
                let ok = false;
                if (key === 'date' && block.type === 'date') ok = true;
                if (key === 'amount' && block.value === current.amount) ok = true;
                if (key === 'counter') {
                    const targetAcc = (current.target === current.debit) ? current.credit : current.debit;
                    if (block.value === targetAcc) ok = true;
                }

                if (ok) {
                    setTData(prev => ({...prev, [key]: block, side: side}));
                    setUsedIds(prev => [...new Set([...prev, id])]);
                    setShowErrorPopup(false);
                } else {
                    triggerError('t-' + key);
                }
            };

            useEffect(() => {
                if (step === 1 && journal.debit && journal.credit) setTimeout(() => setStep(2), 600);
            }, [journal]);

            useEffect(() => {
                if (step === 2 && tData.date && tData.counter && tData.amount) {
                    setTimeout(() => {
                        if (stageIdx < STAGES.length - 1) {
                            alert("正解！次へ進みましょう。");
                            setStageIdx(prev => prev + 1); resetStage();
                        } else {
                            alert("全パターン制覇！完璧です！");
                            setView('menu');
                        }
                    }, 500);
                }
            }, [tData]);

            const resetStage = () => {
                setStep(1); setUsedIds([]); setJournal({debit:null, credit:null});
                setTData({side:null, date:null, counter:null, amount:null});
                setShowErrorPopup(false);
            };

            if (view === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-900 text-white p-12 flex flex-col items-center">
                        <header className="text-center mb-16">
                            <h1 className="text-6xl font-black text-blue-500 mb-4 tracking-tighter">BOKI MASTER</h1>
                            <p className="text-slate-400 text-xl font-medium">日商簿記3級・転記パズル</p>
                        </header>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl w-full">
                            {STAGES.map((s, idx) => (
                                <button 
                                    key={s.id} onClick={() => { setStageIdx(idx); resetStage(); setView('play'); }}
                                    className="bg-slate-800 p-8 rounded-[2.5rem] border-2 border-slate-700 hover:border-blue-500 hover:bg-slate-700 transition-all text-left group relative overflow-hidden"
                                >
                                    <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-30 transition-opacity">
                                        <Icon name="book-open" className="w-16 h-16" />
                                    </div>
                                    <div className="text-blue-500 font-black text-[10px] mb-2 uppercase tracking-widest">{s.category}</div>
                                    <h3 className="text-2xl font-bold mb-4 group-hover:text-blue-400">{s.title}</h3>
                                    <div className="text-slate-500 text-xs line-clamp-2">{s.text}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12 min-h-screen">
                    <header className="flex justify-between items-center mb-10">
                        <button onClick={() => setView('menu')} className="bg-white px-6 py-2 rounded-2xl shadow-sm border border-slate-200 text-slate-500 font-bold hover:text-blue-500 transition-all flex items-center">
                            <Icon name="chevron-left" className="w-4 h-4 mr-2" /> メニュー
                        </button>
                        <div className="flex gap-2">
                            {[1, 2].map(i => <div key={i} className={`w-12 h-2 rounded-full ${step >= i ? 'bg-blue-500' : 'bg-slate-200'}`}></div>)}
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-10">
                        {/* Info */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 border-l-[12px] border-l-blue-500">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Question</h3>
                                <p className="text-xl font-bold text-slate-800 italic leading-relaxed">「{current.text}」</p>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Block Storage</h3>
                                <div className="flex flex-wrap gap-3">
                                    {blocks.map(b => (
                                        <div
                                            key={b.id} draggable="true"
                                            onDragStart={e => e.dataTransfer.setData('blockId', b.id)}
                                            className={`${b.color} text-white px-5 py-3 rounded-2xl font-bold text-sm shadow-lg cursor-grab hover:scale-105 active:scale-95 transition-all ${usedIds.includes(b.id) ? 'slashed' : ''}`}
                                        >
                                            {b.value}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Workspace */}
                        <div className="lg:col-span-8 space-y-12">
                            {/* Step 1: Journal */}
                            <div className={`transition-all duration-500 ${step > 1 ? 'opacity-30 scale-95 blur-sm' : ''}`}>
                                <div className="flex justify-center items-center gap-6">
                                    <div 
                                        onDragOver={e=>{e.preventDefault(); setHoverId('debit')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropJournal(e,'debit')} 
                                        className={`w-56 h-28 rounded-[2.5rem] drop-zone flex items-center justify-center ${journal.debit?'bg-white border-blue-500 border-4 shadow-xl':'bg-slate-50'} ${hoverId==='debit'?'active-hover':''} ${errorId==='debit'?'animate-shake':''}`}
                                    >
                                        {journal.debit ? <span className={`${journal.debit.color} text-white px-6 py-2.5 rounded-xl font-bold shadow-md`}>{journal.debit.value}</span> : <span className="text-xs font-black text-slate-300">借方 (左)</span>}
                                    </div>
                                    <div className="text-4xl font-black text-slate-200">/</div>
                                    <div 
                                        onDragOver={e=>{e.preventDefault(); setHoverId('credit')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropJournal(e,'credit')}
                                        className={`w-56 h-28 rounded-[2.5rem] drop-zone flex items-center justify-center ${journal.credit?'bg-white border-blue-500 border-4 shadow-xl':'bg-slate-50'} ${hoverId==='credit'?'active-hover':''} ${errorId==='credit'?'animate-shake':''}`}
                                    >
                                        {journal.credit ? <span className={`${journal.credit.color} text-white px-6 py-2.5 rounded-xl font-bold shadow-md`}>{journal.credit.value}</span> : <span className="text-xs font-black text-slate-300">貸方 (右)</span>}
                                    </div>
                                </div>
                            </div>

                            {/* Step 2: T-Account */}
                            <div className="relative">
                                {showErrorPopup && (
                                    <div className="absolute -top-16 left-1/2 -translate-x-1/2 z-50 w-full max-sm:px-4 hint-popup">
                                        <div className="bg-red-500 text-white p-4 rounded-2xl shadow-2xl relative text-center">
                                            <p className="text-sm font-bold leading-relaxed">{current.errorHint}</p>
                                            <div className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-red-500 rotate-45"></div>
                                        </div>
                                    </div>
                                )}

                                <div className={`bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-200 transition-all duration-700 ${step === 1 ? 'opacity-10 scale-90 blur-xl pointer-events-none' : ''}`}>
                                    <div className="text-center mb-10">
                                        <span className="bg-slate-800 text-white px-12 py-3 rounded-full font-black text-2xl shadow-xl inline-block">
                                            {current.target}
                                        </span>
                                    </div>
                                    
                                    <div className="relative min-h-[350px]">
                                        <div className="h-2 bg-slate-800 w-full rounded-full"></div>
                                        <div className="absolute top-0 bottom-0 left-1/2 w-2 bg-slate-800 -ml-1 rounded-full"></div>
                                        <div className="flex h-full min-h-[300px]">
                                            {/* Left */}
                                            <div className={`flex-1 p-6 ${step === 2 && current.targetSide === 'left' ? 'bg-blue-50/20' : ''}`}>
                                                <div className="grid grid-cols-12 gap-3 mt-4">
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-date-l')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'date','left')} className={`col-span-3 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='left'&&tData.date?'bg-indigo-50 border-indigo-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-date-l'?'active-hover':''} ${errorId==='t-date'&&current.targetSide==='left'?'animate-shake':''}`}>
                                                        {tData.side==='left'&&tData.date && <span className="text-[10px] font-black text-indigo-600">{tData.date.value}</span>}
                                                    </div>
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-counter-l')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'counter','left')} className={`col-span-5 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='left'&&tData.counter?'bg-slate-50 border-slate-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-counter-l'?'active-hover':''} ${errorId==='t-counter'&&current.targetSide==='left'?'animate-shake':''}`}>
                                                        {tData.side==='left'&&tData.counter && <span className="text-[11px] font-black text-slate-600">{tData.counter.value}</span>}
                                                    </div>
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-amount-l')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'amount','left')} className={`col-span-4 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='left'&&tData.amount?'bg-amber-50 border-amber-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-amount-l'?'active-hover':''} ${errorId==='t-amount'&&current.targetSide==='left'?'animate-shake':''}`}>
                                                        {tData.side==='left'&&tData.amount && <span className="text-[11px] font-black text-amber-600">{tData.amount.value}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                            {/* Right */}
                                            <div className={`flex-1 p-6 ${step === 2 && current.targetSide === 'right' ? 'bg-blue-50/20' : ''}`}>
                                                <div className="grid grid-cols-12 gap-3 mt-4">
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-date-r')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'date','right')} className={`col-span-3 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='right'&&tData.date?'bg-indigo-50 border-indigo-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-date-r'?'active-hover':''} ${errorId==='t-date'&&current.targetSide==='right'?'animate-shake':''}`}>
                                                        {tData.side==='right'&&tData.date && <span className="text-[10px] font-black text-indigo-600">{tData.date.value}</span>}
                                                    </div>
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-counter-r')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'counter','right')} className={`col-span-5 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='right'&&tData.counter?'bg-slate-50 border-slate-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-counter-r'?'active-hover':''} ${errorId==='t-counter'&&current.targetSide==='right'?'animate-shake':''}`}>
                                                        {tData.side==='right'&&tData.counter && <span className="text-[11px] font-black text-slate-600">{tData.counter.value}</span>}
                                                    </div>
                                                    <div onDragOver={e=>{e.preventDefault(); setHoverId('t-amount-r')}} onDragLeave={()=>setHoverId(null)} onDrop={e=>onDropTDetail(e,'amount','right')} className={`col-span-4 h-14 drop-zone rounded-2xl flex items-center justify-center ${tData.side==='right'&&tData.amount?'bg-amber-50 border-amber-400 border-2 shadow-inner':'bg-white'} ${hoverId==='t-amount-r'?'active-hover':''} ${errorId==='t-amount'&&current.targetSide==='right'?'animate-shake':''}`}>
                                                        {tData.side==='right'&&tData.amount && <span className="text-[11px] font-black text-amber-600">{tData.amount.value}</span>}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
